services:
  - type: web
    name: flare-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flare-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: PORT
        value: "8000"
      # Les clés suivantes devront être remplies manuellement dans le dashboard Render si besoin
      - key: SUPABASE_URL
        value: "a_remplir"
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: "a_remplir"
      - key: FIREBASE_PROJECT_ID
        value: "rams-flare-ai"
      - key: FLIGHT_MODE
        value: "True"

  - type: web
    env: static
    name: flare-frontend
    rootDir: frontend
    buildCommand: "npm ci --include=dev && npm run build"
    staticPublishPath: out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: flare-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: NODE_ENV
        value: "production"
      - key: NEXT_PUBLIC_FIREBASE_API_KEY
        value: "AIzaSyDZld3Ndw9maCtJsi3Ol9F6gV9Zbf4tZRg"
      - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        value: "rams-flare-ai.firebaseapp.com"
      - key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
        value: "rams-flare-ai"
      - key: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
        value: "rams-flare-ai.firebasestorage.app"
      - key: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        value: "461942823604"
      - key: NEXT_PUBLIC_FIREBASE_APP_ID
        value: "1:461942823604:web:46b2d179d027b7849195e1"

databases:
  - name: flare-db
    databaseName: flare
    user: flare_admin
    plan: free
