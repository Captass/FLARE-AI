services:
  - type: web
    name: flare-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flare-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: PORT
        value: "8000"
      # --- Configuration serveur ---
      - key: APP_ENV
        value: "production"
      - key: FRONTEND_URL
        value: "https://flareai.ramsflare.com"
      - key: BACKEND_URL
        value: "https://flare-backend-ab5h.onrender.com"
      # --- Firebase ---
      - key: FIREBASE_PROJECT_ID
        value: "rams-flare-ai"
      - key: FLIGHT_MODE
        value: "True"
      # --- Supabase (optionnel) ---
      - key: SUPABASE_URL
        value: "a_remplir"
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: "a_remplir"
      # --- Multi-Keys Gemini ---
      - key: GEMINI_API_KEY_GLOBAL
        value: "a_remplir"
      - key: GEMINI_API_KEY_CHATBOT
        value: "a_remplir"
      - key: GEMINI_API_KEY_ASSISTANT_REASONING
        value: "a_remplir"
      - key: GEMINI_API_KEY_ASSISTANT_FAST
        value: "a_remplir"
      # --- Meta Facebook (À remplir manuellement dans Render Dashboard) ---
      # - key: META_APP_ID
      # - key: META_APP_SECRET
      # - key: META_VERIFY_TOKEN

  - type: web
    env: static
    name: flare-frontend
    rootDir: frontend
    buildCommand: "npm ci --include=dev && npm run build"
    staticPublishPath: out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: flare-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: NODE_ENV
        value: "production"
      - key: NEXT_PUBLIC_FIREBASE_API_KEY
        value: "AIzaSyDZld3Ndw9maCtJsi3Ol9F6gV9Zbf4tZRg"
      - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        value: "rams-flare-ai.firebaseapp.com"
      - key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
        value: "rams-flare-ai"
      - key: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
        value: "rams-flare-ai.firebasestorage.app"
      - key: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        value: "461942823604"
      - key: NEXT_PUBLIC_FIREBASE_APP_ID
        value: "1:461942823604:web:46b2d179d027b7849195e1"

databases:
  - name: flare-db
    databaseName: flare
    user: flare_admin
    plan: free
