name: Quality Gates

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_APP_ENV: production
      NEXT_PUBLIC_API_URL: https://flare-backend-jyyz.onrender.com
      NEXT_PUBLIC_WEB_APP_URL: https://flareai.ramsflare.com/app?auth=signup
      NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyDZld3Ndw9maCtJsi3Ol9F6gV9Zbf4tZRg
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: rams-flare-ai.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: rams-flare-ai
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: rams-flare-ai.firebasestorage.app
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "461942823604"
      NEXT_PUBLIC_FIREBASE_APP_ID: 1:461942823604:web:46b2d179d027b7849195e1
      NEXT_PUBLIC_WINDOWS_RELEASE_ASSET_URL: https://github.com/Captass/FLARE-AI/releases/download/v0.1.0-beta.20260426/flare-ai-windows-setup.exe
      NEXT_PUBLIC_ANDROID_RELEASE_ASSET_URL: https://github.com/Captass/FLARE-AI/releases/download/v0.1.0-beta.20260426/flare-ai-android.apk
      NEXT_PUBLIC_WINDOWS_RELEASE_VERSION: 0.1.0-beta.20260426
      NEXT_PUBLIC_ANDROID_RELEASE_VERSION: 0.1.0-beta.20260426
      NEXT_PUBLIC_WINDOWS_RELEASE_DATE: "2026-04-26"
      NEXT_PUBLIC_ANDROID_RELEASE_DATE: "2026-04-26"
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r backend/requirements.txt
      - run: python -m py_compile backend/main.py backend/routers/facebook_pages.py backend/routers/gmail.py backend/core/config.py backend/core/llm_factory.py
      - run: python -m unittest backend.tests.test_gmail_ai_reply
      - name: Smoke import backend app
        env:
          APP_ENV: ci
          DATABASE_URL: sqlite:///./ci_smoke.db
          TESTING: "true"
        run: |
          cd backend
          python - <<'PY'
          from fastapi.testclient import TestClient
          from main import app

          with TestClient(app) as client:
              for path in ("/health", "/api/app/version"):
                  response = client.get(path)
                  assert response.status_code == 200, (path, response.status_code, response.text)
          PY
